<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Icon: three Kanban columns as stacked rectangles -->
  <rect x="2" y="8" width="10" height="32" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
  <rect x="16" y="8" width="10" height="22" rx="3" fill="url(#iconGrad)" opacity="0.7"/>
  <rect x="30" y="8" width="10" height="28" rx="3" fill="url(#iconGrad)" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="50" y="33" font-family="'Inter', 'Segoe UI', sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="url(#grad)">NexBoard</text>
</svg>
