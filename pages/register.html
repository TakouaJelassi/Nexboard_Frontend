<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — NexBoard</title>
  <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="../index.html"><img src="../assets/img/logo.svg" alt="NexBoard" /></a>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Free forever · No credit card required</p>

      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label class="form-label" for="fullname">Full name</label>
          <input class="form-input" type="text" id="fullname" placeholder="Takoua Jelassi" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input class="form-input input-with-icon" type="password" id="password"
              placeholder="Min. 8 characters" required />
            <button type="button" id="togglePw" class="btn-ghost btn-icon input-icon-btn">
              <img src="../assets/icons/eye.svg" width="18" height="18" class="icon-muted" alt="" />
            </button>
          </div>
          <div class="pw-strength">
            <div id="pwBar" class="pw-strength-bar"></div>
          </div>
          <span id="pwHint" class="pw-hint"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm password</label>
          <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat password" required />
        </div>

        <div id="errorMsg" class="alert alert-error hidden"></div>
        <div id="successMsg" class="alert alert-success hidden"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Create account
        </button>

        <p class="terms-text">
          By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </p>

    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
