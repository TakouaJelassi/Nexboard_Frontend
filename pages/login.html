<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — NexBoard</title>
  <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="../index.html"><img src="../assets/img/logo.svg" alt="NexBoard" /></a>
      </div>

      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your NexBoard workspace</p>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" type="email" id="email" name="email"
            placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input class="form-input input-with-icon" type="password" id="password"
              name="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" id="togglePw" class="btn-ghost btn-icon input-icon-btn" title="Show password">
              <img src="../assets/icons/eye.svg" width="18" height="18" class="icon-muted" alt="" />
            </button>
          </div>
        </div>

        <div id="errorMsg" class="alert alert-error hidden"></div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Sign in
        </button>
      </form>

      <div class="divider-or">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
      </div>

      <button onclick="guestLogin()" class="btn btn-secondary btn-full">
        <img src="../assets/icons/user.svg" width="16" height="16" class="btn-icon" alt="" />
        Continue as Guest
      </button>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Create one free</a>
      </p>

    </div>
  </div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
